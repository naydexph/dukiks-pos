<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUKIKS POS</title>
<style>
/* NO CHANGES TO STYLES - PRESERVING EXACTLY AS REQUESTED */
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 80px 10px 40px 10px;
  background-color: #ff6b00;
  font-size: 16px;
}

.logo-container { text-align: center; margin-top: 10px; }
.logo-container img { max-height: 80px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }

h1 { text-align: center; font-weight: bold; font-size: 28px; color: white; margin-top: 5px; }
.subtitle { text-align: center; font-size: 11px; color: white; margin-bottom: 30px; }

.panel { max-width: 1000px; width: 100%; margin: 0 auto 40px auto; box-sizing: border-box; }

#orderTable th {
    color: white !important;
    background-color: black; 
}

table { border-collapse: collapse; border-radius: 10px; overflow: hidden; background: white; width: 100%; font-size: 14px; }
th, td { padding: 8px 10px; text-align: left; }
th { background-color: black; color: white !important; }
td { color: black; border-bottom: 1px solid #eee; }

.white-panel { background-color: white; padding: 15px; border-radius: 15px; }
.white-panel h2 { text-align: center; color: black; margin-bottom: 22px; font-size: 20px; }

.summary-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
.summary-card { background: black; color: white; padding: 10px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 4px #333; }
.summary-card div { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: #ff6b00; }
.summary-card span { font-size: 16px; font-weight: bold; }

.input-row { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 850px; margin: 0 auto 12px auto; }
.input-row label { font-weight: bold; color: black; margin-bottom: 5px; font-size: 14px;}
.input-row input, .input-row select { padding: 8px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; transition: all 0.3s; width: 100%; box-sizing: border-box; }

.side-by-side { display: flex; gap: 10px; justify-content: flex-start; max-width: 850px; margin: 0 auto 12px auto; }
.side-by-side .input-row { flex: 0 0 auto; margin: 0; }
.small-input { width: 80px !important; }

.hidden-field { display: none; }

.order-table { width: 100%; max-width: 850px; margin: 20px auto; border-collapse: collapse; }
.order-table th, .order-table td { border: 1px solid #ccc; color: black; padding: 8px; }
.order-table select { width: 100%; font-size: 16px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
.order-table input { width: 70px !important; font-size: 16px; text-align: center; border: 1px solid #ddd; border-radius: 5px; }

.action-btn {
  background-color: #000000; color: white; border: none; padding: 12px 20px; cursor: pointer; display: block; margin: 20px auto;
  font-size: 16px; font-weight: bold; border-radius: 12px; width: 100%; max-width: 320px; text-align: center;
  box-shadow: 0 6px #333; transition: all 0.2s; position: relative;
}
.action-btn:hover { background-color: #ff6b00; box-shadow: 0 6px #b34a00; }
.action-btn:active { box-shadow: 0 2px #333; transform: translateY(4px); }

#newDayBtn { background-color: #ff3b30; box-shadow: 0 6px #8b1a14; }
#newDayBtn:hover { background-color: #d32f2f; }

.del-btn { background: none; border: none; cursor: pointer; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.history-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }
.success-state { background-color: #4cd964 !important; box-shadow: 0 6px #38a84d !important; }
.error-msg { color: #ff3b30; font-size: 14px; text-align: center; font-weight: bold; margin-bottom: 15px; display: none; }

.history-panel { background-color: white; border-radius: 10px; padding: 15px; }
.history-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
.history-table th, .history-table td { border: 1px solid #ccc; padding: 6px; color: black; }
.history-table th { background-color: black; color: white !important; }

.floating-datetime { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); padding: 5px 15px; border-radius: 50px; text-align: center; z-index: 9999; color: white; width: 80%; }
.digital-time { font-size: 20px; font-weight: bold; line-height: 1; }
.date-display { font-size: 12px; margin-top: 3px; }

.required-star { color: #ff3b30; font-size: 12px; margin-left: 4px; }

.error-bump { border: 2px solid #ff3b30 !important; animation: shake 0.4s ease-in-out; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
</style>
</head>
<body>

<div class="floating-datetime">
  <div class="digital-time" id="timePHT"></div>
  <div class="date-display" id="datePHT"></div>
</div>

<div class="logo-container">
  <img src="dukiks-logo.png" alt="Dukiks Logo">
</div>

<h1>Dukik's Hungry Hub</h1>
<div class="subtitle">Order Intake Form</div>

<div class="panel">
  <table id="menuDisplayTable">
    <thead><tr><th>Type</th><th>Menu</th><th>Code</th><th>Price</th></tr></thead>
    <tbody id="menuDisplayBody"></tbody>
  </table>
</div>

<div class="panel white-panel">
  <h2>Order Intake</h2>
  <div id="validationError" class="error-msg">⚠️ Please check Name, Address, and Items!</div>
  
  <div class="input-row">
    <label>Name <span class="required-star">*</span></label>
    <input type="text" id="customerName" placeholder="Customer Name" oninput="saveCurrentDraft()">
  </div>

  <div class="input-row">
    <label>Community <span class="required-star">*</span></label>
    <select id="communitySelect" onchange="toggleAddressFields(); saveCurrentDraft();">
      <option value="Home">Home Address (Not a Subdivision)</option>
    </select>
  </div>

  <div id="subdivisionGroup" class="hidden-field side-by-side">
    <div class="input-row">
      <label>BLK/Floor <span class="required-star">*</span></label>
      <input type="text" id="blockFloor" class="small-input" placeholder="000" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0,4); saveCurrentDraft();">
    </div>
    <div class="input-row">
      <label>Lot/Room <span class="required-star">*</span></label>
      <input type="text" id="lotRoom" class="small-input" placeholder="000" oninput="this.value = this.value.replace(/[^0-9]/g, '').substring(0,4); saveCurrentDraft();">
    </div>
  </div>

  <div id="homeAddressGroup">
    <div class="input-row">
      <label>Home Address <span class="required-star">*</span></label>
      <input type="text" id="customerAddress" placeholder="Street / Barangay / Landmark" oninput="saveCurrentDraft()">
    </div>
  </div>
  
  <table class="order-table" id="orderTable">
    <thead><tr><th>Order <span class="required-star">*</span></th><th>Qty</th><th>Price</th></tr></thead>
    <tbody id="orderBody"></tbody>
  </table>

  <div class="input-row">
    <label>Notes</label>
    <input type="text" id="specialInstructions" placeholder="Special Instructions" oninput="saveCurrentDraft()">
  </div>

  <button class="action-btn" id="startNewOrderBtn">Log Order & Clear</button>
</div>

<div class="panel history-panel">
  <h3 style="text-align:center">Order History Dashboard</h3>
  <div class="summary-container">
    <div class="summary-card"><div>Total Orders</div><span id="summaryTotalOrders">0</span></div>
    <div class="summary-card"><div>Total Sales</div><span id="summaryTotalSales">0.00</span></div>
    <div class="summary-card"><div>Best Seller</div><span id="summaryBestSeller">None</span></div>
  </div>
  <div class="summary-card" style="text-align: left; padding: 20px; width: 100%; box-sizing: border-box; margin-bottom: 20px;">
    <div id="itemBreakdown" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;"></div>
  </div>
  <div style="overflow-x:auto;">
    <table class="history-table">
      <thead>
        <tr><th>Copy</th><th>Receipt</th><th>Total</th><th>Status</th><th>Mode</th><th>Name</th><th>Address</th><th>Orders</th><th>Notes</th><th>Order#</th><th>Action</th></tr>
      </thead>
      <tbody id="historyBox"></tbody>
    </table>
  </div>
  <button class="action-btn" id="copyTableBtn" style="margin-top: 30px;">⧉ Submit Sales Log</button>
</div>

<button class="action-btn" id="newDayBtn" onclick="startNewDay()">Start a New Day</button>

<script>
// --- SHEET SYNC LOGIC ---
const menuSheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUovN3y6yfyLJ0yLVqvrvEEUaipZ3gf6mkuSqJ4oBOg0cEVNwwDs9PC6TH2U0u9kE4a3jEaugquiGg/pub?gid=159409582&single=true&output=csv";
const communitySheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRUovN3y6yfyLJ0yLVqvrvEEUaipZ3gf6mkuSqJ4oBOg0cEVNwwDs9PC6TH2U0u9kE4a3jEaugquiGg/pub?gid=2021575806&single=true&output=csv";

let menuData = [];

async function loadDataFromSheets() {
  try {
    const mRes = await fetch(menuSheetURL);
    const mCsv = await mRes.text();
    menuData = mCsv.split("\n").slice(1).filter(r => r.trim() !== "").map(row => {
      const cols = row.split(",");
      return { type: cols[0], menu: cols[1], code: cols[2], price: parseFloat(cols[3]) || 0 };
    });
    
    const cRes = await fetch(communitySheetURL);
    const cCsv = await cRes.text();
    const communities = cCsv.split("\n").slice(1).filter(r => r.trim() !== "");
    
    const commSelect = document.getElementById("communitySelect");
    communities.forEach(c => {
      const opt = document.createElement("option");
      const cleanVal = c.replace(/[\r\n]/g, "").trim();
      opt.value = cleanVal;
      opt.textContent = cleanVal;
      commSelect.appendChild(opt);
    });

    document.getElementById("menuDisplayBody").innerHTML = menuData.map(m => `<tr><td>${m.type}</td><td>${m.menu}</td><td>${m.code}</td><td>${m.price.toFixed(2)}</td></tr>`).join('');
    initPOS();
  } catch (e) { console.error("Sheet Loading Error:", e); }
}

const orderBody = document.getElementById("orderBody");
const historyBox = document.getElementById("historyBox");
const nameInp = document.getElementById("customerName");
const commInp = document.getElementById("communitySelect");
const blkInp = document.getElementById("blockFloor");
const lotInp = document.getElementById("lotRoom");
const addrInp = document.getElementById("customerAddress");
const notesInp = document.getElementById("specialInstructions");

function initPOS() {
  const saved = localStorage.getItem("dukiks_history");
  if(saved) {
    historyBox.innerHTML = saved;
    historyBox.querySelectorAll('tr').forEach(row => {
      const statusSelect = row.cells[3]?.querySelector('select');
      const paySelect = row.cells[4]?.querySelector('select');
      if(statusSelect) { statusSelect.value = statusSelect.getAttribute('data-val'); statusSelect.onchange = saveHistory; }
      if(paySelect) { paySelect.value = paySelect.getAttribute('data-val'); paySelect.onchange = saveHistory; }
    });
  }
  const savedDraft = localStorage.getItem("dukiks_draft");
  if(savedDraft) {
    const d = JSON.parse(savedDraft);
    nameInp.value = d.name || "";
    commInp.value = d.comm || "Home";
    blkInp.value = d.blk || "";
    lotInp.value = d.lot || "";
    addrInp.value = d.addr || "";
    notesInp.value = d.notes || "";
    if(d.items && d.items.length > 0) { d.items.forEach(item => addOrderRow(item.code, item.qty)); }
    addOrderRow();
  } else { addOrderRow(); }
  updateTable();
  updateSummary();
  updateClock();
  toggleAddressFields();
}

window.onload = loadDataFromSheets;

function saveCurrentDraft() {
    const items = [];
    orderBody.querySelectorAll("tr:not(#grandTotalRow)").forEach(row => {
        const code = row.querySelector("select").value;
        const qty = row.querySelector("input").value;
        if(code) items.push({code, qty});
    });
    localStorage.setItem("dukiks_draft", JSON.stringify({ name: nameInp.value, comm: commInp.value, blk: blkInp.value, lot: lotInp.value, addr: addrInp.value, notes: notesInp.value, items: items }));
}

function toggleAddressFields() {
  const subGroup = document.getElementById("subdivisionGroup");
  const homeGroup = document.getElementById("homeAddressGroup");
  if(commInp.value === "Home") {
    subGroup.classList.add("hidden-field"); homeGroup.classList.remove("hidden-field");
  } else {
    subGroup.classList.remove("hidden-field"); homeGroup.classList.add("hidden-field");
  }
}

function formatPHP(num) { return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

function addOrderRow(selectedCode = "", selectedQty = 1) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><select class="item-select" onchange="updateTable(); saveCurrentDraft();"><option value="">Select</option>${menuData.map(m=>`<option value="${m.code}" ${m.code === selectedCode ? 'selected' : ''}>${m.menu}</option>`).join('')}</select></td>
    <td><input type="number" value="${selectedQty}" min="1" oninput="updateTable(); saveCurrentDraft();"></td>
    <td class="row-total">0.00</td>
  `;
  orderBody.appendChild(tr);
}

function updateTable() {
  let grandTotal = 0;
  const rows = orderBody.querySelectorAll("tr:not(#grandTotalRow)");
  rows.forEach((row, i) => {
    const code = row.querySelector("select").value;
    const qty = parseInt(row.querySelector("input").value) || 0;
    const item = menuData.find(m => m.code === code);
    const price = item ? item.price * qty : 0;
    row.querySelector(".row-total").textContent = formatPHP(price);
    grandTotal += price;
    if (i === rows.length - 1 && code !== "") addOrderRow();
  });
  const oldGT = document.getElementById("grandTotalRow");
  if(oldGT) oldGT.remove();
  const gtRow = document.createElement("tr");
  gtRow.id = "grandTotalRow";
  gtRow.innerHTML = `<td colspan="2" style="text-align:right; font-weight:bold;">Grand Total:</td><td style="color:red; font-weight:bold;">${formatPHP(grandTotal)}</td>`;
  orderBody.appendChild(gtRow);
}

function saveHistory() {
    historyBox.querySelectorAll('select').forEach(sel => { sel.setAttribute('data-val', sel.value); });
    localStorage.setItem("dukiks_history", historyBox.innerHTML);
    updateSummary();
}

function updateSummary() {
  const rows = historyBox.querySelectorAll("tr");
  let totalSales = 0;
  let itemCounts = { "Fried Chicken": 0, "Pork Steak": 0, "Pork Chop": 0, "Vegetable Lumpia": 0, "Pork Lumpia": 0, "Rice": 0 };
  rows.forEach(row => {
    totalSales += parseFloat(row.cells[2].innerText.replace(/,/g, '')) || 0;
    const orderItems = row.cells[13]?.innerText.split(', ') || [];
    orderItems.forEach(itemStr => {
      const parts = itemStr.split('x ');
      if(parts.length > 1) {
        const qty = parseInt(parts[0]) || 0;
        const code = parts[1];
        const menuItem = menuData.find(m => m.code === code);
        if(menuItem) {
          const name = menuItem.menu;
          if (name.includes("Fried Chicken")) itemCounts["Fried Chicken"] += qty;
          else if (name.includes("Pork Steak")) itemCounts["Pork Steak"] += qty;
          else if (name.includes("Pork Chop")) itemCounts["Pork Chop"] += qty;
          else if (name.includes("Vegetable Lumpia")) itemCounts["Vegetable Lumpia"] += qty;
          else if (name.includes("Pork Lumpia")) itemCounts["Pork Lumpia"] += qty;
          if (name.includes("Rice")) itemCounts["Rice"] += qty;
        }
      }
    });
  });
  document.getElementById("summaryTotalOrders").textContent = rows.length;
  document.getElementById("summaryTotalSales").textContent = formatPHP(totalSales);
  const breakdownDiv = document.getElementById("itemBreakdown");
  const displayOrder = ["Fried Chicken", "Pork Steak", "Pork Chop", "Vegetable Lumpia", "Pork Lumpia", "Rice"];
  breakdownDiv.innerHTML = displayOrder.map(name => `<div style="display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0;"><span style="font-size: 11px; color: #ddd;"><span style="color: #ff6b00; font-weight: bold;">${itemCounts[name]}</span> ${name.toUpperCase()}</span></div>`).join('');
}

document.getElementById("startNewOrderBtn").onclick = function() {
  document.querySelectorAll('.error-bump').forEach(el => el.classList.remove('error-bump'));
  let valid = true;
  if (!nameInp.value.trim()) { nameInp.classList.add('error-bump'); valid = false; }
  if (commInp.value === "Home") { if (!addrInp.value.trim()) { addrInp.classList.add('error-bump'); valid = false; }
  } else { if (!blkInp.value.trim()) { blkInp.classList.add('error-bump'); valid = false; } if (!lotInp.value.trim()) { lotInp.classList.add('error-bump'); valid = false; } }
  
  let ordersCodes = []; let ordersPretty = []; let total = 0;
  orderBody.querySelectorAll("tr:not(#grandTotalRow)").forEach(r => {
    const code = r.querySelector("select").value;
    const qty = r.querySelector("input").value;
    const item = menuData.find(m => m.code === code);
    if(item) { ordersCodes.push(`${qty}x ${item.code}`); ordersPretty.push(`${qty}x ${item.menu}`); total += item.price * qty; }
  });

  if(!valid || ordersCodes.length === 0) { document.getElementById("validationError").style.display = "block"; return; }
  document.getElementById("validationError").style.display = "none";

  const now = new Date();
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const day = now.getDate().toString().padStart(2, '0');
  const year = now.getFullYear();
  let hours = now.getHours(); const ampm = hours >= 12 ? 'PM' : 'AM'; hours = hours % 12 || 12;
  const hStr = hours.toString().padStart(2, '0'); const mStr = now.getMinutes().toString().padStart(2, '0'); const sStr = now.getSeconds().toString().padStart(2, '0');
  const refNum = `${month}${day}${year}-${hStr}${mStr}${sStr}${ampm}`;
  let fullAddress = (commInp.value === "Home") ? addrInp.value : `${commInp.value} - Blk ${blkInp.value}, Lot ${lotInp.value}`;

  const hRow = document.createElement("tr");
  hRow.innerHTML = `
    <td><button class="action-btn" style="width:auto; padding:5px 10px; margin:0; font-size:11px;" onclick="copyOrderSummary(this)">Copy</button></td>
    <td><button class="action-btn" style="width:auto; padding:5px 10px; margin:0; font-size:11px; background-color:#007bff;" onclick="copyReceipt(this)">Receipt</button></td>
    <td style="font-weight:bold;">${formatPHP(total)}</td>
    <td><select class="history-select" data-val="Unpaid" onchange="saveHistory()"><option>Unpaid</option><option>Paid</option></select></td>
    <td><select class="history-select" data-val="GCash" onchange="saveHistory()"><option>GCash</option><option>Cash</option></select></td>
    <td>${nameInp.value}</td><td>${fullAddress}</td><td>${ordersPretty.join("<br>")}</td><td>${notesInp.value || '-'}</td><td style="font-weight:bold; color:#ff6b00;">${refNum}</td>
    <td style="text-align:center"><button class="del-btn" onclick="deleteRow(this)">🗑️</button></td>
    <th style="display:none">${month}/${day}/${year}</th><th style="display:none">${hStr}:${mStr} ${ampm}</th><th style="display:none">${ordersCodes.join(", ")}</th>
  `;
  historyBox.appendChild(hRow);
  saveHistory();
  copyOrderSummary(hRow.querySelector('button'));
  localStorage.removeItem("dukiks_draft");
  this.textContent = "✅ Logged!";
  setTimeout(() => { location.reload(); }, 800);
};

function copyOrderSummary(btn) {
  const row = btn.closest("tr");
  const summary = `${row.cells[9].innerText}\n${row.cells[11].innerText} ${row.cells[12].innerText}\nName: ${row.cells[5].innerText}\nAddress: ${row.cells[6].innerText}\n\nOrders:\n${row.cells[7].innerText.replace(/<br>/g, '\n')}\n\nNotes: ${row.cells[8].innerText}`;
  navigator.clipboard.writeText(summary);
  window.location.href = "fb-messenger://user-thread/1629578618166443";
}

function copyReceipt(btn) {
  const row = btn.closest("tr");
  const receipt = `${row.cells[7].innerText.replace(/<br>/g, '\n')}\nTotal: ₱${row.cells[2].innerText}`;
  navigator.clipboard.writeText(receipt);
}

function deleteRow(btn) { if(confirm("Delete?")) { btn.closest("tr").remove(); saveHistory(); } }
function startNewDay() { if(confirm("Clear All?")) { localStorage.clear(); location.reload(); } }

function updateClock() {
  const now = new Date();
  const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  let hours = now.getHours(); const ampm = hours >= 12 ? 'PM' : 'AM'; hours = hours % 12 || 12;
  // RESTORED SECONDS: HH:MM:SS AM/PM
  document.getElementById('timePHT').textContent = `${hours.toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')} ${ampm}`;
  // UPDATED DATE: Friday, March 13, 2026
  document.getElementById('datePHT').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
</script>
</body>
</html>
