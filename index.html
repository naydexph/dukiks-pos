<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUKIKS POS</title>
<style>
/* PRESERVING ALL ORIGINAL STYLES */
body { font-family: Arial, sans-serif; margin: 0; padding: 80px 10px 40px 10px; background-color: #ff6b00; font-size: 16px; }
.logo-container { text-align: center; margin-top: 10px; }
.logo-container img { max-height: 80px; width: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
h1 { text-align: center; font-weight: bold; font-size: 28px; color: white; margin-top: 5px; }
.subtitle { text-align: center; font-size: 11px; color: white; margin-bottom: 30px; }
.panel { max-width: 1000px; width: 100%; margin: 0 auto 40px auto; box-sizing: border-box; }
#orderTable th { color: white !important; background-color: black; }
table { border-collapse: collapse; border-radius: 10px; overflow: hidden; background: white; width: 100%; font-size: 14px; }
th, td { padding: 8px 10px; text-align: left; }
th { background-color: black; color: white !important; }
td { color: black; border-bottom: 1px solid #eee; }
.white-panel { background-color: white; padding: 15px; border-radius: 15px; }
.white-panel h2 { text-align: center; color: black; margin-bottom: 22px; font-size: 20px; }
.summary-container { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
.summary-card { background: black; color: white; padding: 10px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 4px #333; }
.summary-card div { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; color: #ff6b00; }
.summary-card span { font-size: 16px; font-weight: bold; }
.input-row { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 850px; margin: 0 auto 12px auto; }
.input-row label { font-weight: bold; color: black; margin-bottom: 5px; font-size: 14px;}
.input-row input, .input-row select { padding: 8px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; }
.side-by-side { display: flex; gap: 10px; justify-content: flex-start; max-width: 850px; margin: 0 auto 12px auto; }
.side-by-side .input-row { flex: 0 0 auto; margin: 0; }
.small-input { width: 80px !important; }
.hidden-field { display: none; }
.order-table { width: 100%; max-width: 850px; margin: 20px auto; border-collapse: collapse; }
.order-table th, .order-table td { border: 1px solid #ccc; color: black; padding: 8px; }
.order-table select { width: 100%; font-size: 16px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
.order-table input { width: 70px !important; font-size: 16px; text-align: center; border: 1px solid #ddd; border-radius: 5px; }
.action-btn { background-color: #000000; color: white; border: none; padding: 12px 20px; cursor: pointer; display: block; margin: 20px auto; font-size: 16px; font-weight: bold; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 6px #333; position: relative; }
.action-btn:active { transform: translateY(4px); box-shadow: 0 2px #333; }
.success-state { background-color: #4cd964 !important; box-shadow: 0 6px #38a84d !important; }
.floating-datetime { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.85); padding: 5px 15px; border-radius: 50px; text-align: center; z-index: 9999; color: white; width: 80%; }
.digital-time { font-size: 20px; font-weight: bold; }
.date-display { font-size: 12px; }
.error-bump { border: 2px solid #ff3b30 !important; }
</style>
</head>
<body>

<div class="floating-datetime">
  <div class="digital-time" id="timePHT"></div>
  <div class="date-display" id="datePHT"></div>
</div>

<div class="logo-container">
  <img src="dukiks-logo.png" alt="Dukiks Logo">
</div>

<h1>Dukik's Hungry Hub</h1>
<div class="subtitle">Order Intake Form</div>

<div class="panel white-panel">
  <h2>Order Intake</h2>
  <div id="validationError" style="color:red; text-align:center; display:none; margin-bottom:10px;">⚠️ Check Required Fields!</div>
  
  <div class="input-row">
    <label>Name *</label>
    <input type="text" id="customerName" oninput="saveCurrentDraft()">
  </div>

  <div class="input-row">
    <label>Community *</label>
    <select id="communitySelect" onchange="toggleAddressFields(); saveCurrentDraft();">
      <option value="Home">Home Address</option>
      <option value="Navona">Navona</option>
      <option value="Evissa">Evissa</option>
      <option value="Astana">Astana</option>
    </select>
  </div>

  <div id="subdivisionGroup" class="hidden-field side-by-side">
    <div class="input-row">
      <label>BLK/Floor *</label>
      <input type="text" id="blockFloor" class="small-input" oninput="saveCurrentDraft()">
    </div>
    <div class="input-row">
      <label>Lot/Room *</label>
      <input type="text" id="lotRoom" class="small-input" oninput="saveCurrentDraft()">
    </div>
  </div>

  <div id="homeAddressGroup">
    <div class="input-row">
      <label>Home Address *</label>
      <input type="text" id="customerAddress" oninput="saveCurrentDraft()">
    </div>
  </div>
  
  <table class="order-table" id="orderTable">
    <thead><tr><th>Order *</th><th>Qty</th><th>Price</th></tr></thead>
    <tbody id="orderBody"></tbody>
  </table>

  <div class="input-row">
    <label>Notes</label>
    <input type="text" id="specialInstructions" oninput="saveCurrentDraft()">
  </div>

  <button class="action-btn" id="startNewOrderBtn">Log Order & Clear</button>
</div>

<div class="panel history-panel">
  <h3 style="text-align:center">Order History Dashboard</h3>
  <div class="summary-container">
    <div class="summary-card"><div>Total Orders</div><span id="summaryTotalOrders">0</span></div>
    <div class="summary-card"><div>Total Sales</div><span id="summaryTotalSales">0.00</span></div>
  </div>
  <div style="overflow-x:auto;">
    <table class="history-table">
      <thead>
        <tr>
          <th>Copy</th><th>Receipt</th><th>Total</th><th>Status</th><th>Mode</th><th>Name</th><th>Address</th><th>Orders</th><th>Notes</th><th>Order#</th><th>Action</th>
          <th style="display:none">D</th><th style="display:none">T</th><th style="display:none">Raw</th>
        </tr>
      </thead>
      <tbody id="historyBox"></tbody>
    </table>
  </div>
  <button class="action-btn" id="copyTableBtn">⧉ Submit Sales Log</button>
</div>

<button class="action-btn" id="newDayBtn" onclick="startNewDay()" style="background-color:red;">Start a New Day</button>

<script>
const menuData = [
  {menu:"1pc Fried Chicken with Rice", code:"1FCWR", price:62},
  {menu:"2pc Fried Chicken with Rice", code:"2FCWR", price:109},
  {menu:"Pork Steak with Rice", code:"PSWR", price:149},
  {menu:"Pork Chop with Rice", code:"PCWR", price:75},
  {menu:"Extra Rice", code:"EXRice", price:15}
];

const orderBody = document.getElementById("orderBody");
const historyBox = document.getElementById("historyBox");
const nameInp = document.getElementById("customerName");
const commInp = document.getElementById("communitySelect");
const blkInp = document.getElementById("blockFloor");
const lotInp = document.getElementById("lotRoom");
const addrInp = document.getElementById("customerAddress");
const notesInp = document.getElementById("specialInstructions");

window.onload = () => {
  const saved = localStorage.getItem("dukiks_history");
  if(saved) {
    historyBox.innerHTML = saved;
    historyBox.querySelectorAll('tr').forEach(row => {
      const statusSelect = row.cells[3]?.querySelector('select');
      const paySelect = row.cells[4]?.querySelector('select');
      if(statusSelect) { statusSelect.value = statusSelect.getAttribute('data-val'); statusSelect.onchange = saveHistory; }
      if(paySelect) { paySelect.value = paySelect.getAttribute('data-val'); paySelect.onchange = saveHistory; }
    });
  }
  addOrderRow();
  updateClock();
  toggleAddressFields();
};

function saveCurrentDraft() {
  const items = [];
  orderBody.querySelectorAll("tr:not(#grandTotalRow)").forEach(row => {
    const code = row.querySelector("select").value;
    const qty = row.querySelector("input").value;
    if(code) items.push({code, qty});
  });
  localStorage.setItem("dukiks_draft", JSON.stringify({ name: nameInp.value, comm: commInp.value, blk: blkInp.value, lot: lotInp.value, addr: addrInp.value, notes: notesInp.value, items: items }));
}

function toggleAddressFields() {
  if(commInp.value === "Home") {
    document.getElementById("subdivisionGroup").classList.add("hidden-field");
    document.getElementById("homeAddressGroup").classList.remove("hidden-field");
  } else {
    document.getElementById("subdivisionGroup").classList.remove("hidden-field");
    document.getElementById("homeAddressGroup").classList.add("hidden-field");
  }
}

function addOrderRow() {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><select onchange="updateTable(); saveCurrentDraft();"><option value="">Select</option>${menuData.map(m=>`<option value="${m.code}">${m.menu}</option>`).join('')}</select></td>
    <td><input type="number" value="1" min="1" oninput="updateTable(); saveCurrentDraft();"></td>
    <td class="row-total">0.00</td>
  `;
  orderBody.appendChild(tr);
}

function updateTable() {
  let grandTotal = 0;
  const rows = orderBody.querySelectorAll("tr:not(#grandTotalRow)");
  rows.forEach((row, i) => {
    const code = row.querySelector("select").value;
    const qty = parseInt(row.querySelector("input").value) || 0;
    const item = menuData.find(m => m.code === code);
    const price = item ? item.price * qty : 0;
    row.querySelector(".row-total").textContent = price.toFixed(2);
    grandTotal += price;
    if (i === rows.length - 1 && code !== "") addOrderRow();
  });
  const oldGT = document.getElementById("grandTotalRow");
  if(oldGT) oldGT.remove();
  const gtRow = document.createElement("tr");
  gtRow.id = "grandTotalRow";
  gtRow.innerHTML = `<td colspan="2" style="text-align:right;">Grand Total:</td><td style="color:red; font-weight:bold;">${grandTotal.toFixed(2)}</td>`;
  orderBody.appendChild(gtRow);
}

function saveHistory() {
  historyBox.querySelectorAll('select').forEach(sel => { sel.setAttribute('data-val', sel.value); });
  localStorage.setItem("dukiks_history", historyBox.innerHTML);
}

document.getElementById("startNewOrderBtn").onclick = function() {
  let ordersCodes = []; let ordersPretty = []; let total = 0;
  orderBody.querySelectorAll("tr:not(#grandTotalRow)").forEach(r => {
    const code = r.querySelector("select").value;
    const qty = r.querySelector("input").value;
    const item = menuData.find(m => m.code === code);
    if(item) { ordersCodes.push(`${qty}x ${item.code}`); ordersPretty.push(`${qty}x ${item.menu}`); total += item.price * qty; }
  });

  const now = new Date();
  const month = (now.getMonth() + 1).toString().padStart(2, '0');
  const day = now.getDate().toString().padStart(2, '0');
  const year = now.getFullYear();
  let h = now.getHours(); const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  const hStr = h.toString().padStart(2, '0'); const mStr = now.getMinutes().toString().padStart(2, '0'); const sStr = now.getSeconds().toString().padStart(2, '0');
  const refNum = `${month}${day}${year}-${hStr}${mStr}${sStr}${ampm}`;
  let fullAddr = (commInp.value === "Home") ? addrInp.value : `${commInp.value} - Blk ${blkInp.value}, Lot ${lotInp.value}`;

  const hRow = document.createElement("tr");
  hRow.innerHTML = `
    <td><button class="action-btn" style="width:auto; padding:5px;" onclick="copyOrderSummary(this)">Copy</button></td>
    <td><button class="action-btn" style="width:auto; padding:5px; background-color:#007bff;" onclick="copyReceipt(this)">Receipt</button></td>
    <td>${total.toFixed(2)}</td>
    <td><select class="history-select" data-val="Unpaid" onchange="saveHistory()"><option>Unpaid</option><option>Paid</option></select></td>
    <td><select class="history-select" data-val="GCash" onchange="saveHistory()"><option>GCash</option><option>Cash</option></select></td>
    <td>${nameInp.value}</td><td>${fullAddr}</td><td>${ordersPretty.join("<br>")}</td><td>${notesInp.value || '-'}</td><td style="color:#ff6b00;">${refNum}</td>
    <td><button onclick="deleteRow(this)">🗑️</button></td>
    <th style="display:none">${month}/${day}/${year}</th><th style="display:none">${hStr}:${mStr} ${ampm}</th><th style="display:none">${ordersCodes.join(", ")}</th>
  `;
  historyBox.appendChild(hRow);
  saveHistory();
  
  const ot = this.textContent;
  this.textContent = "✅ Logged!";
  this.classList.add("success-state");
  setTimeout(() => { location.reload(); }, 800);
};

function copyOrderSummary(btn) {
  const row = btn.closest("tr");
  const refNum = row.cells[9].innerText; const dateStr = row.cells[11].innerText; const timeStr = row.cells[12].innerText;
  const name = row.cells[5].innerText; const addr = row.cells[6].innerText; const total = row.cells[2].innerText;
  const notes = row.cells[8].innerText; const ordersRaw = row.cells[13].innerText;
  
  let addrParts = addr.split(" - ");
  let commCode = addrParts[0].substring(0,3).toUpperCase();
  let b = blkInp.value || "0"; let l = lotInp.value || "0";
  let shortAddr = `${commCode} ${b}/${l}`;

  const orderCodes = ordersRaw.split(", ");
  const fullOrderNames = orderCodes.map(item => { const parts = item.split("x "); const q = parts[0]; const c = parts[1]; const m = menuData.find(x => x.code === c); return `${q}x ${m ? m.menu : c}`; }).join("\n");

  const summary = `${refNum}\n${dateStr} ${timeStr}\nName: ${name}\nAddress: ${addr}\n\n${shortAddr} ₱${total}\n\nOrders:\n${fullOrderNames}\n\nNotes: ${notes}`;
  navigator.clipboard.writeText(summary);
  const ot = btn.innerText; btn.innerText = "✅";
  setTimeout(() => { btn.innerText = ot; }, 1500);
  window.location.href = "fb-messenger://user-thread/1629578618166443";
}

function copyReceipt(btn) {
  const row = btn.closest("tr");
  const ordersRaw = row.cells[13].innerText;
  const orderCodes = ordersRaw.split(", ");
  const fullOrderNames = orderCodes.map(item => { const parts = item.split("x "); const q = parts[0]; const c = parts[1]; const m = menuData.find(x => x.code === c); return `${q}x ${m ? m.menu : c}`; }).join("\n");
  navigator.clipboard.writeText(`${fullOrderNames}\nTotal: ₱${row.cells[2].innerText}`);
  const ot = btn.innerText; btn.innerText = "✅";
  setTimeout(() => { btn.innerText = ot; }, 1500);
}

document.getElementById("copyTableBtn").onclick = function() {
  let text = "";
  historyBox.querySelectorAll("tr").forEach(r => {
    const rowData = [ r.cells[9].innerText, r.cells[11].innerText, r.cells[12].innerText, r.cells[5].innerText, r.cells[6].innerText, r.cells[2].innerText, r.cells[3].querySelector('select').value, r.cells[4].querySelector('select').value, r.cells[13].innerText, r.cells[8].innerText ];
    text += rowData.join("\t") + "\n";
  });
  navigator.clipboard.writeText(text);
  const ot = this.innerText; this.innerText = "✅";
  setTimeout(() => { this.innerText = ot; }, 1500);
  window.location.href = "googlesheets://https://docs.google.com/spreadsheets/d/1Y0fxsaI3jva56h42jg9jRq1FS6vmbXmxl5X2e-cc69I/edit?gid=1589209915#gid=1589209915";
};

function deleteRow(btn) { if(confirm("Delete?")) { btn.closest("tr").remove(); saveHistory(); } }
function startNewDay() { if(confirm("Clear?")) { localStorage.clear(); location.reload(); } }

function updateClock() {
  const now = new Date();
  let h = now.getHours(); const a = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  document.getElementById('timePHT').textContent = `${h.toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')} ${a}`;
  document.getElementById('datePHT').textContent = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'2-digit', year:'numeric'});
}
setInterval(updateClock, 1000);
</script>
</body>
</html>
